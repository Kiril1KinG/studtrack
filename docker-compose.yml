version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: studtrack-db
    environment:
      POSTGRES_DB: studtrack
      POSTGRES_USER: studtrack
      POSTGRES_PASSWORD: studtrack
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U studtrack"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    develop:
      watch:
        - action: rebuild
          path: ./src
    container_name: studtrack-app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/studtrack
      SPRING_DATASOURCE_USERNAME: studtrack
      SPRING_DATASOURCE_PASSWORD: studtrack
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_LIQUIBASE_ENABLED: "false"
    ports:
      - "8080:8080"

volumes:
  postgres-data: