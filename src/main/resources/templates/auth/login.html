<!DOCTYPE html>
<html th:replace="~{layout :: layout(content=~{::main})}" xmlns:th="http://www.thymeleaf.org">
<body>
<main>
    <div class="row justify-content-center">
        <div class="col-md-4">
            <h2 class="mb-4">Вход в СтудТрек</h2>
            <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
            <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>
            <div th:if="${param.registered}" class="alert alert-success">Регистрация успешна! Теперь войдите.</div>
            <form method="post" th:action="@{/auth/login}">
                <div class="mb-3">
                    <label>Email</label>
                    <input type="email" name="username" class="form-control" required autofocus>
                </div>
                <div class="mb-3">
                    <label>Пароль</label>
                    <input type="password" name="password" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">Войти</button>
            </form>
            <p class="mt-3">Нет аккаунта? <a th:href="@{/auth/register}">Зарегистрироваться</a></p>
        </div>
    </div>
</main>
</body>
</html>
