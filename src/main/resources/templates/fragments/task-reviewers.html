<div th:fragment="reviewerList(taskId, reviewers, currentUserId, isCurrentUserAssignee, isOwner)" id="reviewers-list" xmlns:th="http://www.thymeleaf.org">
    <div th:if="${reviewerErrorMessage}" class="alert alert-danger py-1 px-2 small mb-2" th:text="${reviewerErrorMessage}"></div>
    <th:block th:if="${reviewers.isEmpty()}">
        <p class="text-muted">–Ý–µ–≤—å—é–µ—Ä—ã –Ω–µ –Ω–∞–∑–Ω–∞—á–µ–Ω—ã</p>
    </th:block>
    <ul class="list-group">
        <li th:each="reviewer : ${reviewers}" class="list-group-item d-flex justify-content-between align-items-center">
            <div>
                <span th:text="${reviewer.user.fullName}">–ò–º—è</span>
                <span class="badge ms-2"
                      th:classappend="${reviewer.status == T(ru.diploma.studtrack.model.TaskReviewer.ReviewStatus).APPROVED} ? 'bg-success' :
                                       (${reviewer.status == T(ru.diploma.studtrack.model.TaskReviewer.ReviewStatus).REJECTED} ? 'bg-danger' : 'bg-secondary')"
                      th:text="${reviewer.status}">STATUS</span>
            </div>
            <div th:if="${reviewer.user.id == currentUserId}">
                <form th:action="@{/tasks/{taskId}/reviewers/{reviewerId}/submit(taskId=${taskId}, reviewerId=${reviewer.user.id})}"
                      method="post"
                      th:attr="hx-post=@{/tasks/{taskId}/reviewers/{reviewerId}/submit(taskId=${taskId}, reviewerId=${reviewer.user.id})}"
                      hx-target="#reviewers-list"
                      hx-swap="outerHTML"
                      class="d-inline">
                    <input type="hidden" name="status" value="APPROVED">
                    <button type="submit" class="btn btn-sm btn-outline-success" title="–û–¥–æ–±—Ä–∏—Ç—å">‚úÖ</button>
                </form>
                <form th:action="@{/tasks/{taskId}/reviewers/{reviewerId}/submit(taskId=${taskId}, reviewerId=${reviewer.user.id})}"
                      method="post"
                      th:attr="hx-post=@{/tasks/{taskId}/reviewers/{reviewerId}/submit(taskId=${taskId}, reviewerId=${reviewer.user.id})}"
                      hx-target="#reviewers-list"
                      hx-swap="outerHTML"
                      class="d-inline">
                    <input type="hidden" name="status" value="REJECTED">
                    <button type="submit" class="btn btn-sm btn-outline-danger" title="–û—Ç–∫–ª–æ–Ω–∏—Ç—å">‚ùå</button>
                </form>
            </div>
            <form th:if="${isOwner || isCurrentUserAssignee || reviewer.user.id == currentUserId}"
                  th:action="@{/tasks/{taskId}/reviewers/{reviewerId}(taskId=${taskId}, reviewerId=${reviewer.user.id})}"
                  method="post"
                  th:attr="hx-delete=@{/tasks/{taskId}/reviewers/{reviewerId}(taskId=${taskId}, reviewerId=${reviewer.user.id})}"
                  hx-target="#reviewers-list"
                  hx-swap="outerHTML"
                  class="d-inline ms-2">
                <button type="submit" class="btn btn-sm btn-outline-secondary" title="–£–¥–∞–ª–∏—Ç—å –∏–∑ —Ä–µ–≤—å—é–µ—Ä–æ–≤">
                    <i class="bi bi-trash"></i>
                </button>
            </form>
        </li>
    </ul>
</div>
