                    <i class="bi bi-kanban"></i> Проекты

<script>
    (function() {
        var path = window.location.pathname;
        document.querySelectorAll('#sidebar-nav a[data-path]').forEach(function(a) {
            if (path === a.dataset.path || (a.dataset.path !== '/tasks/my' && path.startsWith(a.dataset.path))) {
                a.classList.add('active', 'fw-semibold');
            }
        });
    })();
</script>
