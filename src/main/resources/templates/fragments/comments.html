<div th:fragment="singleComment(comment)" th:object="${comment}"
     xmlns:th="http://www.thymeleaf.org"
     xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
    <div class="border-bottom pb-2 mb-2" th:id="'comment-' + ${comment.id}">
        <strong th:text="*{author.fullName}">Автор</strong>
        <small class="text-muted ms-2" th:text="${#temporals.format(comment.createdAt, 'dd.MM.yyyy HH:mm')}"></small>

        <div th:if="${#authentication != null && #authentication.name == comment.author.email}" class="float-end">
            <button class="btn btn-sm btn-link"
                    th:attr="hx-get=@{/tasks/comments/{id}/edit(id=${comment.id})},hx-target='#comment-' + ${comment.id}"
                    hx-swap="outerHTML">✏️</button>
            <button class="btn btn-sm btn-link text-danger"
                    th:attr="hx-delete=@{/tasks/comments/{id}(id=${comment.id})},hx-target='#comment-' + ${comment.id}"
                    hx-swap="outerHTML"
                    hx-confirm="Удалить комментарий?">🗑️</button>
        </div>

        <p class="mt-1 mb-0" th:text="*{content}"></p>
    </div>
</div>

<div th:fragment="editComment(comment)" th:object="${comment}"
     xmlns:th="http://www.thymeleaf.org"
     xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
    <div class="border-bottom pb-2 mb-2" th:id="'comment-' + ${comment.id}">
        <strong th:text="*{author.fullName}">Автор</strong>
        <small class="text-muted ms-2" th:text="${#temporals.format(comment.createdAt, 'dd.MM.yyyy HH:mm')}"></small>

        <form class="mt-2"
              th:attr="hx-put=@{/tasks/comments/{id}(id=${comment.id})},hx-target='#comment-' + ${comment.id}"
              hx-swap="outerHTML">
            <textarea name="content" class="form-control form-control-sm mb-2" rows="2" required
                      th:text="*{content}"></textarea>
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-sm btn-primary">Сохранить</button>
                <button type="button" class="btn btn-sm btn-outline-secondary"
                        th:attr="hx-get=@{/tasks/comments/{id}/cancel(id=${comment.id})},hx-target='#comment-' + ${comment.id}"
                        hx-swap="outerHTML">
                    Отмена
                </button>
            </div>
        </form>
    </div>
</div>

<th:block th:fragment="commentList(comments)"
          xmlns:th="http://www.thymeleaf.org"
          xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
    <th:block th:each="comment : ${comments}">
        <div th:replace="~{fragments/comments :: singleComment(comment=${comment})}"></div>
    </th:block>
</th:block>

<th:block th:fragment="crCommentList"
          xmlns:th="http://www.thymeleaf.org"
          xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
    <div class="border rounded p-2 bg-light">
        <div th:if="${comments.isEmpty()}" class="text-muted small mb-2">Комментариев пока нет.</div>
        <th:block th:each="comment : ${comments}">
            <div th:replace="~{fragments/comments :: singleComment(comment=${comment})}"></div>
        </th:block>
        <form th:attr="hx-post=@{/tasks/change-requests/{id}/comments(id=${crId})},hx-target='#cr-thread-' + ${crId}"
              th:action="@{/tasks/change-requests/{id}/comments(id=${crId})}"
              method="post"
              hx-swap="innerHTML"
              hx-on::after-request="this.reset()"
              class="mt-2 d-flex gap-2">
            <input type="text" name="content" class="form-control form-control-sm"
                   placeholder="Написать комментарий..." required>
            <button type="submit" class="btn btn-sm btn-primary flex-shrink-0">Отправить</button>
        </form>
    </div>
</th:block>
