<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{::content})}">
<th:block th:fragment="content">
    <div class="d-flex justify-content-between align-items-center mt-3 mb-3">
        <h2 class="h4 mb-0">Уведомления</h2>
    </div>

    <form method="get" th:action="@{/notifications}" class="mb-3">
        <div class="form-check">
            <input class="form-check-input"
                   type="checkbox"
                   id="unreadOnly"
                   name="unreadOnly"
                   value="true"
                   th:checked="${unreadOnly}"
                   onchange="this.form.submit()">
            <label class="form-check-label" for="unreadOnly">
                Только непрочитанные
            </label>
        </div>
    </form>

    <div class="card">
        <div class="list-group list-group-flush">
            <a th:each="n : ${notifications}"
               class="list-group-item list-group-item-action"
               th:classappend="${!n.read} ? 'list-group-item-light'"
               th:href="@{${n.targetUrl}}">
                <div class="d-flex justify-content-between align-items-start">
                    <div class="me-3">
                        <div class="fw-semibold" th:text="${n.message}">message</div>
                    </div>
                    <small class="text-muted"
                           th:text="${#temporals.format(n.createdAt, 'dd.MM.yyyy HH:mm')}">date</small>
                </div>
            </a>
            <div th:if="${notifications == null || notifications.isEmpty()}" class="list-group-item text-muted">
                Уведомлений пока нет
            </div>
        </div>
    </div>
</th:block>
</html>
