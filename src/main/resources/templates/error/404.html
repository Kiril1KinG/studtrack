<!DOCTYPE html>
<html th:replace="~{layout :: layout(content=~{::main})}" xmlns:th="http://www.thymeleaf.org">
<body>
<main>
    <div class="row justify-content-center py-5">
        <div class="col-lg-6 col-md-8">
            <div class="card border-0 shadow-sm">
                <div class="card-body text-center p-5">
                    <div class="display-4 fw-bold text-secondary mb-2" th:text="${statusCode} ?: 404">404</div>
                    <h1 class="h4 mb-3" th:text="${pageTitle} ?: 'Страница не найдена'">Страница не найдена</h1>
                    <p class="text-muted mb-4" th:text="${errorMessage} ?: 'Запрошенная страница не существует или была перемещена.'">
                        Запрошенная страница не существует или была перемещена.
                    </p>
                    <div class="d-flex justify-content-center gap-2">
                        <a class="btn btn-primary" th:href="@{/projects}">
                            <i class="bi bi-grid me-1"></i>К проектам
                        </a>
                        <a class="btn btn-outline-secondary" th:href="@{/}">
                            <i class="bi bi-house me-1"></i>На главную
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>
</body>
</html>
