<!DOCTYPE html>
<html th:replace="~{layout :: layout(content=~{::main})}" xmlns:th="http://www.thymeleaf.org">
<body>
<main>
    <div class="row justify-content-center py-5">
        <div class="col-lg-6 col-md-8">
            <div class="card border-0 shadow-sm">
                <div class="card-body text-center p-5">
                    <div class="display-4 fw-bold text-danger mb-2" th:text="${statusCode} ?: 500">500</div>
                    <h1 class="h4 mb-3" th:text="${pageTitle} ?: 'Внутренняя ошибка'">Внутренняя ошибка</h1>
                    <p class="text-muted mb-4" th:text="${errorMessage} ?: 'Произошла непредвиденная ошибка. Попробуйте снова позже.'">
                        Произошла непредвиденная ошибка. Попробуйте снова позже.
                    </p>
                    <div class="d-flex justify-content-center gap-2">
                        <a class="btn btn-primary" th:href="@{/projects}">
                            <i class="bi bi-grid me-1"></i>К проектам
                        </a>
                        <a class="btn btn-outline-secondary" href="javascript:history.back()">
                            <i class="bi bi-arrow-left me-1"></i>Назад
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>
</body>
</html>
