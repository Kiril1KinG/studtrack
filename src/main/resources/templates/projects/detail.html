<!DOCTYPE html>
<html th:replace="~{layout :: layout(content=~{::main})}"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<main>
    <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
        <div>
            <h1 class="h2 mb-0" th:text="${project.name}">Проект</h1>
            <small class="text-muted" th:if="${project.description != null && !project.description.isBlank()}"
                   th:text="${project.description}"></small>
        </div>
        <div th:if="${activeTab == 'board' || activeTab == null}">
            <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#createTaskModal">
                <i class="bi bi-plus-lg"></i> Новая задача
            </button>
        </div>
    </div>

    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <span th:text="${errorMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <ul class="nav nav-tabs mb-4" id="projectTabs">
        <li class="nav-item">
            <a class="nav-link"
               th:classappend="${activeTab == null || activeTab == 'board'} ? 'active' : ''"
               th:href="@{/projects/{id}(id=${project.id})}">
                <i class="bi bi-kanban"></i> Доска
            </a>
        </li>
        <li class="nav-item">
            <a class="nav-link"
               th:classappend="${activeTab == 'members'} ? 'active' : ''"
               th:href="@{/projects/{id}(id=${project.id}, tab='members')}">
                <i class="bi bi-people"></i> Участники
                <span class="badge bg-secondary ms-1" th:text="${members.size()}">0</span>
            </a>
        </li>
        <li class="nav-item">
            <a class="nav-link"
               th:classappend="${activeTab == 'repository'} ? 'active' : ''"
               th:href="@{/projects/{id}(id=${project.id}, tab='repository')}">
                <i class="bi bi-archive"></i> Репозиторий
            </a>
        </li>
        <li class="nav-item">
            <a class="nav-link"
               th:classappend="${activeTab == 'statistics'} ? 'active' : ''"
               th:href="@{/projects/{id}(id=${project.id}, tab='statistics')}">
                <i class="bi bi-bar-chart"></i> Статистика
            </a>
        </li>
        <li class="nav-item" th:if="${isOwner}">
            <a class="nav-link"
               th:classappend="${activeTab == 'settings'} ? 'active' : ''"
               th:href="@{/projects/{id}(id=${project.id}, tab='settings')}">
                <i class="bi bi-gear"></i> Настройки
            </a>
        </li>
    </ul>

    <div th:if="${activeTab == null || activeTab == 'board'}">
        <div th:replace="~{projects/fragments :: kanbanBoard(project=${project}, tasksByStatus=${tasksByStatus}, statuses=${statuses}, reviewStateByTaskId=${reviewStateByTaskId}, reviewStatsByTaskId=${reviewStatsByTaskId})}"></div>
        <div th:replace="~{fragments/modals :: createTaskModal(projectId=${project.id})}"></div>
    </div>

    <div th:if="${activeTab == 'members'}">
        <div class="row">
            <div class="col-md-8">
                <div class="card">
                    <div class="card-header">Участники проекта</div>
                    <div class="card-body p-0">
                        <ul class="list-group list-group-flush">
                            <li th:each="member : ${members}"
                                class="list-group-item d-flex justify-content-between align-items-center">
                                <div>
                                    <i class="bi bi-person-circle me-2"></i>
                                    <span th:text="${member.user.fullName}">Имя</span>
                                    <small class="text-muted ms-2" th:text="${member.user.email}">email</small>
                                    <span th:if="${member.user.id == project.owner.id}"
                                          class="badge bg-warning text-dark ms-2">Владелец</span>
                                </div>
                                <div class="d-flex gap-2">
                                    <form th:if="${isOwner && member.user.id != project.owner.id}"
                                          th:action="@{/projects/{id}/members/{userId}/remove(id=${project.id}, userId=${member.user.id})}"
                                          method="post"
                                          onsubmit="return confirm('Удалить участника?')">
                                        <button type="submit" class="btn btn-sm btn-outline-danger">
                                            <i class="bi bi-x-lg"></i>
                                        </button>
                                    </form>
                                    <form th:if="${!isOwner && member.user.id == currentUser.id}"
                                          th:action="@{/projects/{id}/leave(id=${project.id})}"
                                          method="post"
                                          onsubmit="return confirm('Покинуть проект?')">
                                        <button type="submit" class="btn btn-sm btn-outline-warning">
                                            Покинуть
                                        </button>
                                    </form>
                                </div>
                            </li>
                        </ul>
                    </div>
                </div>
            </div>

            <div class="col-md-4" th:if="${isOwner}">
                <div class="card">
                    <div class="card-header">Добавить участника</div>
                    <div class="card-body">
                        <form th:action="@{/projects/{id}/members/add(id=${project.id})}" method="post">
                            <div class="mb-3">
                                <label class="form-label">Email пользователя</label>
                                <input type="email" name="email" class="form-control"
                                       placeholder="user@example.com" required>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">
                                <i class="bi bi-person-plus"></i> Добавить
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div th:if="${activeTab == 'repository'}">
        <div th:replace="~{projects/fragments :: repositoryTab(project=${project}, repositoryArtifacts=${repositoryArtifacts}, repositorySort=${repositorySort})}"></div>
    </div>

    <div th:if="${activeTab == 'statistics'}">
        <div th:replace="~{projects/fragments :: statisticsTab(project=${project}, members=${members}, statistics=${statistics}, statisticsPeriod=${statisticsPeriod}, statisticsMemberId=${statisticsMemberId})}"></div>
    </div>

    <div th:if="${activeTab == 'settings' && isOwner}">
        <div class="row">
            <div class="col-md-7">
                <div class="card mb-4">
                    <div class="card-header">Редактировать проект</div>
                    <div class="card-body">
                        <form th:action="@{/projects/{id}/update(id=${project.id})}" method="post">
                            <div class="mb-3">
                                <label class="form-label fw-semibold">Название</label>
                                <input type="text" name="name" class="form-control"
                                       th:value="${project.name}" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-semibold">Описание</label>
                                <textarea name="description" class="form-control" rows="3"
                                          th:text="${project.description}"></textarea>
                            </div>
                            <button type="submit" class="btn btn-primary">Сохранить изменения</button>
                        </form>
                    </div>
                </div>

                <div class="card border-danger">
                    <div class="card-header text-danger">Опасная зона</div>
                    <div class="card-body">
                        <p class="text-muted">Удаление проекта необратимо. Все задачи и данные будут удалены.</p>
                        <form th:action="@{/projects/{id}/delete(id=${project.id})}" method="post"
                              onsubmit="return confirm('Вы уверены? Проект будет удалён безвозвратно.')">
                            <button type="submit" class="btn btn-danger">
                                <i class="bi bi-trash"></i> Удалить проект
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>
</body>
</html>
